# render.yaml — Render Infrastructure as Code
# Push to GitHub and connect the repo on https://dashboard.render.com
# Render will auto-detect this file and set up the service.

services:
  - type: web
    name: easypoints-api
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    plan: free
    envVars:
      - key: MONGODB_URI
        sync: false # You must set this manually in the Render dashboard
      - key: JWT_SECRET
        sync: false # You must set this manually in the Render dashboard
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
    healthCheckPath: /api
