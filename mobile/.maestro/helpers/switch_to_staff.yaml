appId: com.easypoints
---
# Helper: Switch from member mode to staff mode via role switcher
# Prerequisite: Must be logged in and on member home screen

# Tap the role bar to open Switch Mode modal
- tapOn: 'Member Mode'
- waitForAnimationToEnd

# Tap Staff in the role switcher modal
- tapOn: 'Staff'
- waitForAnimationToEnd
