appId: com.easypoints
---
# Helper: Login as staff+member (hafez@demo.com / demo123)
- runFlow: fresh_launch.yaml

# Tap the demo staff account shortcut
- tapOn: "🏷️ hafez@demo.com — Staff + Customer"

# Tap Sign In
- tapOn: "Sign In"

# Wait for consent or home screen
- waitForAnimationToEnd

# Handle consent screen if it appears
- runFlow:
    when:
      visible: "I Agree — Let's Go"
    commands:
      - tapOn: "I Agree — Let's Go"
      - waitForAnimationToEnd
